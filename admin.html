<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Blog Admin | Mahavir Industries</title></head><body style="font-family:Poppins,sans-serif;margin:0;background:#F8F9FA;">
<nav style="padding:14px 24px;background:#fff;border-bottom:1px solid #eee;"><a href="index.html" style="text-decoration:none;color:#111;font-weight:700;">Mahavir Industries</a></nav>
<main style="max-width:700px;margin:40px auto;padding:0 20px;"><h1>Create Blog Post</h1><form id="blogForm"><label>Title</label><input id="title" required style="display:block;width:100%;padding:10px;margin:8px 0 16px;"><label>Content</label><textarea id="content" required style="display:block;width:100%;padding:10px;min-height:120px;margin:8px 0 16px;"></textarea><label>Image URL</label><input id="image" style="display:block;width:100%;padding:10px;margin:8px 0 16px;"><button type="submit" style="background:#D4500F;color:#fff;border:none;padding:10px 18px;">Save Blog</button></form><p><a href="blog.html">View Blog Listing</a></p></main>
<script>
document.getElementById('blogForm').addEventListener('submit',e=>{e.preventDefault();const blogs=JSON.parse(localStorage.getItem('mahavirBlogs')||'[]');blogs.push({title:title.value.trim(),content:content.value.trim(),image:image.value.trim(),createdAt:new Date().toISOString()});localStorage.setItem('mahavirBlogs',JSON.stringify(blogs));alert('Saved');e.target.reset();});
</script></body></html>
